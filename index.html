<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Async Weather Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>🌤 Async Weather Tracker</h1>

    <div class="parent-card">

        <!-- LEFT -->
        <div class="card">
            <h3>Search City</h3>

            <div class="input-group">
                <input id="cityInput" placeholder="Enter city...">
                <button id="searchBtn">Search</button>
            </div>

            <h3 style="margin-top:20px;">History</h3>
            <button class="clear-btn" onclick="clearHistory()">Clear All</button>
            <div class="history" id="history"></div>
        </div>

        <!-- RIGHT -->
        <div class="card">
            <h3>Weather Info</h3>
            <div id="weather"></div>
        </div>

    </div>

    <!-- EVENT LOOP -->
    <div class="card console-card">
        <h3>⚙️ Event Loop Visual</h3>
        <div class="console" id="console"></div>
    </div>

</div>

<script>
const API_KEY = "d391ee320b476a4f4d4ff1b4cd14ceb0";

const weatherBox = document.getElementById("weather");
const historyBox = document.getElementById("history");
const consoleBox = document.getElementById("console");

function log(msg, type){
    const div = document.createElement("div");
    div.className = `log ${type}`;
    div.textContent = msg;
    consoleBox.appendChild(div);
    consoleBox.scrollTop = consoleBox.scrollHeight;
}

async function getWeather(city){
    const res = await fetch(
        `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
    );
    if(!res.ok) throw new Error("City not found");
    return await res.json();
}

function renderWeather(d){
    weatherBox.innerHTML = `
        <div class="weather-item"><span>City</span><span>${d.name}</span></div>
        <div class="weather-item"><span>Temp</span><span>${d.main.temp} °C</span></div>
        <div class="weather-item"><span>Weather</span><span>${d.weather[0].main}</span></div>
        <div class="weather-item"><span>Humidity</span><span>${d.main.humidity}%</span></div>
        <div class="weather-item"><span>Wind</span><span>${d.wind.speed} m/s</span></div>
    `;
}

function saveHistory(city){
    let h = JSON.parse(localStorage.getItem("weatherHistory")) || [];
    if(!h.includes(city)) h.unshift(city);
    localStorage.setItem("weatherHistory", JSON.stringify(h));
    showHistory();
}

function showHistory(){
    const h = JSON.parse(localStorage.getItem("weatherHistory")) || [];
    historyBox.innerHTML = h.map(c =>
        `<button onclick="search('${c}')">${c}</button>`
    ).join("");
}

function clearHistory(){
    localStorage.removeItem("weatherHistory");
    historyBox.innerHTML = "";
    log("History Cleared", "callback");
}

async function search(city){
    weatherBox.innerHTML = "";

    log("Start → Call Stack", "callback");
    try{
        log("Fetching API → Async", "async");

        const data = await getWeather(city);

        log("Resolved → Microtask Queue", "promise");

        renderWeather(data);
        saveHistory(data.name);

        log("UI Updated → Callback Queue", "callback");

    }catch(e){
        weatherBox.innerHTML = `<p style="color:red">${e.message}</p>`;
        log("Error Occurred", "callback");
    }
}

searchBtn.onclick = () => {
    const c = cityInput.value.trim();
    if(c) search(c);
};

cityInput.addEventListener("keydown", e => {
    if(e.key === "Enter"){
        const c = cityInput.value.trim();
        if(c) search(c);
    }
});

showHistory();
</script>

</body>
</html>
